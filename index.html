<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>復康監控 v7 FINAL ✅</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f0f2f5;}
.header{background:#0078D7;color:#fff;text-align:center;padding:10px;}

.card{background:#fff;margin:8px;padding:10px;border-radius:10px;}

/* ✅ input 唔爆 */
.row{display:flex;align-items:center;gap:6px;margin:6px 0;}
.row label{width:60px;}
.row input{width:65px;padding:5px;}

/* ✅ 按鈕橫排 */
.btnRow{display:flex;gap:6px;margin-top:8px;}
.btnRow button{
flex:1;
padding:8px;
font-size:12px;
background:#0078D7;
color:#fff;
border:none;
border-radius:6px;
}

/* 🚦 */
.light{padding:4px 10px;border-radius:8px;color:#fff;}
.green{background:green;}
.yellow{background:orange;}
.red{background:red;}

canvas{width:100%!important;height:220px!important;}

@media print{
.btnRow{display:none;}
canvas{display:none;}
}
</style>
</head>

<body>

<div class="header">復康監控 v7 🚦✅</div>

<div class="card">

<div class="row"><label>日期</label>
<input id="date" type="date"></div>

<div class="row"><label>早餐</label><input id="b" type="number"></div>
<div class="row"><label>午餐</label><input id="l" type="number"></div>
<div class="row"><label>下午</label><input id="t" type="number"></div>
<div class="row"><label>晚餐</label><input id="d" type="number"></div>

<div class="row"><label>行早</label><input id="w1" type="number"></div>
<div class="row"><label>行午</label><input id="w2" type="number"></div>
<div class="row"><label>行晚</label><input id="w3" type="number"></div>

<div class="btnRow">
<button onclick="save()">💾 存</button>
<button onclick="exportPDF()">PDF</button>
<button onclick="exportCSV()">Excel</button>
</div>

</div>

<div class="card" id="result"></div>
<div class="card"><canvas id="chart"></canvas></div>

<script>

date.value=new Date().toISOString().slice(0,10);

let records=JSON.parse(localStorage.getItem("records")||"[]");

function save(){

let bV=+b.value||0,lV=+l.value||0,tV=+t.value||0,dV=+d.value||0;
let w1V=+w1.value||0,w2V=+w2.value||0,w3V=+w3.value||0;

let sit=bV+lV+tV+dV;
let walk=w1V+w2V+w3V;
let maxSit=Math.max(bV,lV,tV,dV);

let score=sit+(walk*0.5)+maxSit;

// 🚦
let cls="green",light="🟢";
if(score>80){cls="red";light="🔴";}
else if(score>=60){cls="yellow";light="🟡";}

// 🤖 評語
let comment="✅ 正常";
if(score>80) comment="⚠️ 坐太多";
else if(score>=60) comment="🙂 注意";

// 存
let data={date:date.value,sit,walk,maxSit,score,
b:bV,l:lV,t:tV,d:dV,w1:w1V,w2:w2V,w3:w3V};

let i=records.findIndex(x=>x.date===data.date);
if(i>=0) records[i]=data;
else records.push(data);

localStorage.setItem("records",JSON.stringify(records));

render(cls,light,comment);
}

// ✅ 顯示（最重要已修正）
function render(cls="",light="",comment=""){
if(!records.length) return;

let r=records[records.length-1];

result.innerHTML=`
📅 ${r.date} <span class="light ${cls}">${light}</span><br><br>

🍽 坐<br>
早餐:${r.b} 午餐:${r.l}<br>
下午:${r.t} 晚餐:${r.d}<br><br>

🚶 行<br>
早:${r.w1} 午:${r.w2} 晚:${r.w3}<br><br>

📊 總<br>
坐:${r.sit} 行:${r.walk}<br>
max:${r.maxSit}<br><br>

🧮 計算<br>
= ${r.sit}+(${r.walk}×0.5)+${r.maxSit}<br>
= ${r.score}<br><br>

🤖 ${comment}
`;

drawChart();
}

// ✅ 圖表 FIX
function drawChart(){
let ctx=document.getElementById("chart").getContext("2d");
if(window.chart) window.chart.destroy();

window.chart=new Chart(ctx,{
type:"bar",
data:{
labels:records.map(x=>x.date),
datasets:[
{label:"行",data:records.map(x=>x.walk),backgroundColor:"green"},
{label:"坐",data:records.map(x=>x.sit),backgroundColor:"orange"},
{label:"分",data:records.map(x=>x.score),type:"line",borderColor:"blue"}
]
}
});
}

function exportPDF(){print();}

// ✅ CSV 完整
function exportCSV(){
let csv="日期,早餐,午餐,下午,晚餐,行早,行午,行晚,總坐,總行,maxSit,分數\n";
records.forEach(r=>{
csv+=`${r.date},${r.b},${r.l},${r.t},${r.d},${r.w1},${r.w2},${r.w3},${r.sit},${r.walk},${r.maxSit},${r.score}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="復康完整數據.csv";
a.click();
}

render();

</script>
</body>
</html>
