<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復康監控4</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family: Arial; padding: 20px;}
input {width: 70px; margin: 5px;}
button {margin: 5px; padding: 8px;}
</style>
</head>

<body>

<h2>復康監控 ✅（最終版）</h2>

📅 日期 
<input type="date" id="date" onchange="loadByDate()"><br><br>

早餐 <input type="number" inputmode="numeric" id="b">
午餐 <input type="number" inputmode="numeric" id="l">
下午茶 <input type="number" inputmode="numeric" id="t">
晚餐 <input type="number" inputmode="numeric" id="d"><br><br>

行路早 <input type="number" inputmode="numeric" id="mw">
行路午 <input type="number" inputmode="numeric" id="nw">
行路晚 <input type="number" inputmode="numeric" id="ew"><br><br>

<button onclick="calculate()">計算</button>
<button onclick="saveData()">儲存</button>
<button onclick="exportData()">匯出 CSV</button>

<hr>

<h3>結果</h3>
<div id="result"></div>
<div id="score"></div>
<div id="light"></div>

<canvas id="chart"></canvas>

<script>

let chartInstance;

// ✅ 揀日期
function loadByDate() {
let data = JSON.parse(localStorage.getItem("records")) || {};
let date = document.getElementById("date").value;

if (!data[date]) {
b.value=""; l.value=""; t.value=""; d.value="";
mw.value=""; nw.value=""; ew.value="";
return;
}

let r = data[date];

b.value = r.b;
l.value = r.l;
t.value = r.t;
d.value = r.d;
mw.value = r.mw;
nw.value = r.nw;
ew.value = r.ew;

calculate();
}

// ✅ 計算（你正確公式）
function calculate() {

let b = +document.getElementById("b").value || 0;
let l = +document.getElementById("l").value || 0;
let t = +document.getElementById("t").value || 0;
let d = +document.getElementById("d").value || 0;

let mw = +document.getElementById("mw").value || 0;
let nw = +document.getElementById("nw").value || 0;
let ew = +document.getElementById("ew").value || 0;

let sit = b + l + t + d;
let walk = mw + nw + ew;
let maxSit = Math.max(b,l,t,d);

// ✅ ✅ 你的公式
let score = sit + walk * 0.5 + maxSit;

document.getElementById("result").innerHTML =
`🪑 坐:${sit} ｜ 🚶 行:${walk} ｜ ⏱ 最長坐:${maxSit}`;

document.getElementById("score").innerHTML =
`⭐ 分數: ${score.toFixed(1)}`;

// ✅ 燈號
let light = "🟢";
let color = "green";

if (score > 80) {
  light = "🔴";
  color = "red";
} else if (score > 50) {
  light = "🟡";
  color = "orange";
}

document.getElementById("light").innerHTML =
"健康燈號: " + light;

// ✅ 圖表（分數用燈色）
drawChart(sit, walk, score, color);
}

// ✅ 圖表
function drawChart(sit, walk, score, color) {

let ctx = document.getElementById("chart").getContext("2d");

if (chartInstance) chartInstance.destroy();

chartInstance = new Chart(ctx, {
type: "bar",
data: {
labels: ["坐","行","分數"],
datasets: [{
label: "數值",
data: [sit, walk, score],
backgroundColor: ["blue","blue",color]
}]
}
});
}

// ✅ 儲存
function saveData() {

let date = document.getElementById("date").value;
if (!date) return alert("請選日期");

let data = JSON.parse(localStorage.getItem("records")) || {};

data[date] = {
b: b.value,
l: l.value,
t: t.value,
d: d.value,
mw: mw.value,
nw: nw.value,
ew: ew.value
};

localStorage.setItem("records", JSON.stringify(data));
alert("✅ 已儲存 / 覆蓋");
}

// ✅ 匯出
function exportData() {

let data = JSON.parse(localStorage.getItem("records")) || {};
let csv = "日期,早餐,午餐,下午茶,晚餐,行路早,行路午,行路晚\n";

Object.keys(data).forEach(d=>{
let r = data[d];
csv += `${d},${r.b},${r.l},${r.t},${r.d},${r.mw},${r.nw},${r.ew}\n`;
});

let blob = new Blob([csv], {type:"text/csv"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "record.csv";
a.click();
}

</script>

</body>
</html>
