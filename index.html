<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>復康監控 v4 ☁️</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#f0f2f5;margin:0;}
.header{background:#0078D7;color:#fff;text-align:center;padding:14px;}
.card{background:#fff;margin:10px;padding:10px;border-radius:10px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:6px;
}

input{width:100%;padding:6px;}
button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
background:#0078D7;
color:white;
border-radius:6px;
}
</style>
</head>

<body>

<div class="header">復康監控 v4 ☁️ 完整版</div>

<div class="card">
<div class="grid">

<label>早餐</label><input id="b" type="number" inputmode="numeric">
<label>午餐</label><input id="l" type="number" inputmode="numeric">

<label>下午茶</label><input id="t" type="number" inputmode="numeric">
<label>晚餐</label><input id="d" type="number" inputmode="numeric">

<label>行早</label><input id="w1" type="number" inputmode="numeric">
<label>行午</label><input id="w2" type="number" inputmode="numeric">

<label>行晚</label><input id="w3" type="number" inputmode="numeric">

</div>

<button onclick="save()">💾 儲存</button>
<button onclick="exportPDF()">📄 PDF</button>
<button onclick="exportCSV()">📊 Excel</button>
</div>

<div class="card">
<div id="result"></div>
</div>

<div class="card">
<div id="history"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<!-- ✅ Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// ✅ 你個 config（KEEP）
const firebaseConfig = {
  apiKey: "AIzaSyAeorlICRrg9yj1PqTArO5i1yVQV-tl3ME",
  authDomain: "rehab-monitor-e20e8.firebaseapp.com",
  projectId: "rehab-monitor-e20e8",
  storageBucket: "rehab-monitor-e20e8.firebasestorage.app",
  messagingSenderId: "399484763720",
  appId: "1:399484763720:web:765fc329881851029f627d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let records = [];

// ✅ 儲存
window.save = async function(){

let bV=Number(b.value||0);
let lV=Number(l.value||0);
let tV=Number(t.value||0);
let dV=Number(d.value||0);

let w1V=Number(w1.value||0);
let w2V=Number(w2.value||0);
let w3V=Number(w3.value||0);

// ✅ 計算
let sit = bV+lV+tV+dV;
let walk = w1V+w2V+w3V;
let maxSit = Math.max(bV,lV,tV,dV);

let score = sit + walk*0.5 + maxSit;

// ✅ alert（你要求）
if(score>=60){alert("✅ 今日達標！");}

let data={
date:new Date().toISOString(),
sit,walk,maxSit,score
};

// ✅ 存雲端
await addDoc(collection(db,"records"),data);

// ✅ reload
load();

};

// ✅ 讀60日
async function load(){

const q=query(
collection(db,"records"),
orderBy("date","desc"),
limit(60)
);

const snapshot=await getDocs(q);

records=[];
snapshot.forEach(doc=>records.push(doc.data()));

records.reverse();

render();
}

// ✅ 顯示
function render(){

if(records.length==0)return;

let r=records[records.length-1];

result.innerHTML=
`總坐: ${r.sit}<br>
總行: ${r.walk}<br>
maxSit: ${r.maxSit}<br><br>

方程式:<br>
= ${r.sit} + ${r.walk}×0.5 + ${r.maxSit}<br>
= ${r.score}`;

let html="";
records.forEach(x=>{
html+=`${x.date.substring(0,10)} ⭐${x.score}<br>`;
});
history.innerHTML=html;

// chart
let labels=records.map(x=>x.date.substring(0,10));
let walkArr=records.map(x=>x.walk);
let sitArr=records.map(x=>x.sit);
let scoreArr=records.map(x=>x.score);

if(window.chart) chart.destroy();

window.chart=new Chart(chart,{
data:{
labels:labels,
datasets:[
{label:"行",data:walkArr,backgroundColor:"green"},
{label:"坐",data:sitArr,backgroundColor:"orange"},
{label:"分數",data:scoreArr,type:"line",borderColor:"blue"}
]
}
});

}

window.exportPDF=()=>window.print();

// ✅ CSV
window.exportCSV=()=>{
let csv="日期,坐,行,maxSit,分數\n";
records.forEach(r=>{
csv+=`${r.date},${r.sit},${r.walk},${r.maxSit},${r.score}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
};

// ✅ 開機
load();

</script>

</body>
</html>
