<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>復康監控 v3.8 ✅</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f0f2f5;
}

/* Header */
.header {
  background: #0078D7;
  color: white;
  text-align: center;
  padding: 10px;
  font-size: 18px;
}

/* 卡片 */
.card {
  background: white;
  margin: 8px;
  padding: 10px;
  border-radius: 10px;
}

/* ✅ 關鍵：label + input 黐埋 */
.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 4px 0;
}

.row label {
  width: 40%;
  font-size: 14px;
}

.row input {
  width: 55%;
  padding: 6px;
}

/* Button */
button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  background: #0078D7;
  color: white;
  border: none;
  border-radius: 6px;
}

/* Result */
.result {
  font-size: 14px;
}
</style>
</head>

<body>

<div class="header">復康監控 v3.8 ✅</div>

<div class="card">

<!-- ✅ 每行一個（但貼住，唔會拉長） -->
<div class="row"><label>早餐</label><input id="b" type="number"></div>
<div class="row"><label>午餐</label><input id="l" type="number"></div>
<div class="row"><label>下午茶</label><input id="t" type="number"></div>
<div class="row"><label>晚餐</label><input id="d" type="number"></div>

<div class="row"><label>行早</label><input id="w1" type="number"></div>
<div class="row"><label>行午</label><input id="w2" type="number"></div>
<div class="row"><label>行晚</label><input id="w3" type="number"></div>

<button onclick="save()">💾 儲存</button>
<button onclick="exportPDF()">📄 PDF</button>
<button onclick="exportCSV()">📊 Excel</button>

</div>

<div class="card result" id="result"></div>

<div class="card">
<div id="history"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<script>
let records = JSON.parse(localStorage.getItem("records")||"[]");

function save(){

let bV=Number(b.value||0);
let lV=Number(l.value||0);
let tV=Number(t.value||0);
let dV=Number(d.value||0);

let w1V=Number(w1.value||0);
let w2V=Number(w2.value||0);
let w3V=Number(w3.value||0);

// ✅ 計算
let sit = bV+lV+tV+dV;
let walk = w1V+w2V+w3V;
let maxSit = Math.max(bV,lV,tV,dV);

let score = sit + walk*0.5 + maxSit;

// ✅ 日期（你話要返🔥）
let date = new Date().toLocaleDateString();

// ✅ alert
if(score>=60){alert("✅ 今日達標！");}

let data={date,sit,walk,maxSit,score};

records.push(data);
if(records.length>7) records.shift();

localStorage.setItem("records",JSON.stringify(records));

render();
}

function render(){

if(records.length==0)return;

let r=records[records.length-1];

// ✅ 顯示完整資料 + 方程式
result.innerHTML =
`📅 ${r.date}<br>
總坐: ${r.sit} 分鐘<br>
總行: ${r.walk} 分鐘<br>
maxSit: ${r.maxSit}<br><br>

計算:<br>
= ${r.sit} + ${r.walk}×0.5 + ${r.maxSit}<br>
= ${r.score}`;

// ✅ 歷史（短版）
let html="";
records.forEach(x=>{
html+=`${x.date} ⭐${x.score}<br>`;
});
history.innerHTML=html;

// ✅ 圖表
let labels=records.map(x=>x.date);
let walkArr=records.map(x=>x.walk);
let sitArr=records.map(x=>x.sit);
let scoreArr=records.map(x=>x.score);

if(window.chart) chart.destroy();

window.chart=new Chart(chart,{
data:{
labels:labels,
datasets:[
{label:"行",data:walkArr,backgroundColor:"green"},
{label:"坐",data:sitArr,backgroundColor:"orange"},
{label:"分數",data:scoreArr,type:"line",borderColor:"blue"}
]
}
});
}

// ✅ PDF
function exportPDF(){
window.print();
}

// ✅ CSV
function exportCSV(){
let csv="日期,坐,行,maxSit,分數\n";
records.forEach(r=>{
csv+=`${r.date},${r.sit},${r.walk},${r.maxSit},${r.score}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
}

// ✅ 載入
render();
</script>

</body>
</html>
