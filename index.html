<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>еҫ©еә·зӣЈжҺ§ v7 рҹҡҖ</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f0f2f5;}
.header{background:#0078D7;color:#fff;text-align:center;padding:10px;}

.card{background:#fff;margin:8px;padding:10px;border-radius:10px;}

.row{display:flex;align-items:center;gap:6px;margin:6px 0;}
.row label{width:60px;}
.row input{
width:70px;
padding:5px;
}

/* рҹҡҰ */
.light{padding:4px 10px;border-radius:8px;color:#fff;}
.green{background:green;}
.yellow{background:orange;}
.red{background:red;}

button{
width:100%;
padding:10px;
margin-top:5px;
background:#0078D7;
color:white;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<div class="header">еҫ©еә·зӣЈжҺ§ v7 рҹҡҰвң…</div>

<div class="card">

<div class="row">
<label>ж—Ҙжңҹ</label>
<input id="date" type="date" onchange="loadByDate()">
</div>

<div class="row"><label>ж—©йӨҗ</label><input id="b" type="number"></div>
<div class="row"><label>еҚҲйӨҗ</label><input id="l" type="number"></div>
<div class="row"><label>дёӢеҚҲ</label><input id="t" type="number"></div>
<div class="row"><label>жҷҡйӨҗ</label><input id="d" type="number"></div>

<div class="row"><label>иЎҢж—©</label><input id="w1" type="number"></div>
<div class="row"><label>иЎҢеҚҲ</label><input id="w2" type="number"></div>
<div class="row"><label>иЎҢжҷҡ</label><input id="w3" type="number"></div>

<button onclick="save()">рҹ’ҫ е„Іеӯҳ / жӣҙж–°</button>
<button onclick="exportPDF()">рҹ“„ PDF</button>
<button onclick="exportCSV()">рҹ“Ҡ Excel</button>

</div>

<div class="card" id="result"></div>
<div class="card" id="history"></div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<script>

date.value=new Date().toISOString().slice(0,10);

let records=JSON.parse(localStorage.getItem("records")||"[]");

function loadByDate(){
let r=records.find(x=>x.date===date.value);
if(r){
b.value=r.b||0;l.value=r.l||0;t.value=r.t||0;d.value=r.d||0;
w1.value=r.w1||0;w2.value=r.w2||0;w3.value=r.w3||0;
render();
}
}

function save(){

let bV=+b.value||0,lV=+l.value||0,tV=+t.value||0,dV=+d.value||0;
let w1V=+w1.value||0,w2V=+w2.value||0,w3V=+w3.value||0;

let sit=bV+lV+tV+dV;
let walk=w1V+w2V+w3V;
let maxSit=Math.max(bV,lV,tV,dV);

let score=sit+(walk*0.5)+maxSit;

// зҮҲиҷҹ
let light="рҹҹў жӯЈеёё",cls="green";
if(score>80){light="рҹ”ҙ еҒҸй«ҳ";cls="red";}
else if(score>=60){light="рҹҹЎ жіЁж„Ҹ";cls="yellow";}

// рҹӨ– и©•иӘһ + и¶ЁеӢў
let comment="",trend="";
if(records.length>0){
let last=records[records.length-1].score;
trend = score>last?"рҹ“Ҳ дёҠеҚҮ":"рҹ“ү дёӢйҷҚ";
}

if(score>80) comment="вҡ пёҸ еқҗеӨӘеӨҡпјҢе»әиӯ°жёӣе°‘";
else if(score>=60) comment="рҹҷӮ еҸҜж”№е–„";
else comment="вң… зӢҖж…ӢиүҜеҘҪ";

let data={date:date.value,sit,walk,maxSit,score,
b:bV,l:lV,t:tV,d:dV,w1:w1V,w2:w2V,w3:w3V};

let i=records.findIndex(x=>x.date===data.date);
if(i>=0) records[i]=data;
else records.push(data);

localStorage.setItem("records",JSON.stringify(records));

render(cls,light,comment,trend);
}

function render(cls="",light="",comment="",trend=""){

if(records.length==0)return;

let r=records[records.length-1];

result.innerHTML=`
рҹ“… ${r.date} <span class="light ${cls}">${light}</span><br><br>

рҹҡ¶ иЎҢ: ${r.walk}<br>
рҹӘ‘ еқҗ: ${r.sit}<br>
рҹ“Ң жңҖй•·еқҗ: ${r.maxSit}<br><br>

рҹ“җ е…¬ејҸ<br>
зёҪеҲҶ = еқҗ+(иЎҢГ—0.5)+жңҖй•·еқҗ<br><br>

рҹ§® д»Је…Ҙ<br>
= ${r.sit}+(${r.walk}Г—0.5)+${r.maxSit}<br>
= ${r.sit}+${r.walk*0.5}+${r.maxSit}<br>
= <b>${r.score}</b><br><br>

${trend}<br>
рҹӨ– ${comment}
`;

history.innerHTML = records.slice(-7).map(x=>`рҹ“… ${x.date} вӯҗ${x.score}`).join("<br>");

// chart
if(window.chart) window.chart.destroy();

window.chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:records.map(x=>x.date),
datasets:[
{label:"иЎҢ",data:records.map(x=>x.walk),backgroundColor:"green"},
{label:"еқҗ",data:records.map(x=>x.sit),backgroundColor:"orange"},
{label:"еҲҶж•ё",data:records.map(x=>x.score),type:"line",borderColor:"blue"}
]
}
});
}

function exportPDF(){print();}

function exportCSV(){
let csv="ж—Ҙжңҹ,ж—©йӨҗ,еҚҲйӨҗ,дёӢеҚҲиҢ¶,жҷҡйӨҗ,иЎҢж—©,иЎҢеҚҲ,иЎҢжҷҡ,еқҗ,иЎҢ,maxSit,еҲҶж•ё\n";
records.forEach(r=>{
csv+=`${r.date},${r.b},${r.l},${r.t},${r.d},${r.w1},${r.w2},${r.w3},${r.sit},${r.walk},${r.maxSit},${r.score}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="еҫ©еә·зӣЈжҺ§е®Ңж•ҙж•ёж“ҡ.csv";
a.click();
}

render();

</script>

</body>
</html>
