<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復康監控3</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family: Arial; padding: 20px;}
input {width: 70px; margin: 5px;}
button {margin: 5px; padding: 8px;}
.record {border-bottom:1px solid #ccc; padding:5px;}
</style>
</head>

<body>

<h2>復康監控（選日功能 ✅）</h2>

📅 日期 
<input type="date" id="date" onchange="loadByDate()"><br><br>

早餐 <input id="b">
午餐 <input id="l">
下午茶 <input id="t">
晚餐 <input id="d"><br><br>

行路早 <input id="mw">
行路午 <input id="nw">
行路晚 <input id="ew"><br><br>

<button onclick="calculate()">計算</button>
<button onclick="saveData()">儲存 / 更新</button>
<button onclick="exportData()">匯出 CSV</button>

<hr>

<h3>結果</h3>
<div id="result"></div>
<div id="formula"></div>

<canvas id="chart"></canvas>

<script>

let chartInstance;

// ✅ 揀日期 → 自動載入
function loadByDate() {

let date = document.getElementById("date").value;
if (!date) return;

let data = JSON.parse(localStorage.getItem("records")) || {};

let r = data[date];

if (!r) {
  // 無資料 → 清空
  document.getElementById("b").value = "";
  document.getElementById("l").value = "";
  document.getElementById("t").value = "";
  document.getElementById("d").value = "";
  document.getElementById("mw").value = "";
  document.getElementById("nw").value = "";
  document.getElementById("ew").value = "";
  return;
}

// 有資料 → 填入
b.value = r.b;
l.value = r.l;
t.value = r.t;
d.value = r.d;
mw.value = r.mw;
nw.value = r.nw;
ew.value = r.ew;

calculate();
}

// ✅ 計算
function calculate() {

let b = Number(document.getElementById("b").value) || 0;
let l = Number(document.getElementById("l").value) || 0;
let t = Number(document.getElementById("t").value) || 0;
let d = Number(document.getElementById("d").value) || 0;

let mw = Number(document.getElementById("mw").value) || 0;
let nw = Number(document.getElementById("nw").value) || 0;
let ew = Number(document.getElementById("ew").value) || 0;

let sit = b + l + t + d;
let walk = mw + nw + ew;

result.innerHTML = `🪑 坐: ${sit} ｜ 🚶 行: ${walk}`;
formula.innerHTML = "坐 = 早餐+午餐+下午茶+晚餐｜行 = 早+午+晚";

drawChart(sit, walk);
}

// ✅ 圖表
function drawChart(sit, walk) {
let ctx = document.getElementById("chart").getContext("2d");

if (chartInstance) chartInstance.destroy();

chartInstance = new Chart(ctx, {
type: "bar",
data: {
labels: ["坐", "行"],
datasets: [{
label: "分鐘",
data: [sit, walk]
}]
}
});
}

// ✅ 儲存（按日期）
function saveData() {

let date = document.getElementById("date").value;
if (!date) {
alert("請先選日期");
return;
}

let data = JSON.parse(localStorage.getItem("records")) || {};

data[date] = {
b: b.value,
l: l.value,
t: t.value,
d: d.value,
mw: mw.value,
nw: nw.value,
ew: ew.value
};

localStorage.setItem("records", JSON.stringify(data));

alert("✅ 已儲存 / 覆蓋該日資料");
}

// ✅ 匯出 CSV
function exportData() {

let data = JSON.parse(localStorage.getItem("records")) || {};
let dates = Object.keys(data);

if (dates.length === 0) {
alert("無資料");
return;
}

let csv = "日期,早餐,午餐,下午茶,晚餐,行路早,行路午,行路晚\n";

dates.forEach(d => {
let r = data[d];
csv += `${d},${r.b},${r.l},${r.t},${r.d},${r.mw},${r.nw},${r.ew}\n`;
});

let blob = new Blob([csv], { type: "text/csv" });
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "復康記錄.csv";
a.click();

}

</script>

</body>
</html>
